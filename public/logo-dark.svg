<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Three ascending bars with rounded corners -->
  <!-- Bar 1: Shortest - Hustle Blue #1B4965 -->
  <rect x="20" y="65" width="22" height="40" rx="6" ry="6" fill="#1B4965"/>
  <!-- Bar 2: Medium - Hustle Amber #F59E0B -->
  <rect x="50" y="42" width="22" height="63" rx="6" ry="6" fill="#F59E0B"/>
  <!-- Bar 3: Tallest - Hustle Sunset #EA580C -->
  <rect x="80" y="18" width="22" height="87" rx="6" ry="6" fill="#EA580C"/>
  
  <!-- Wordmark: "my" regular + "HUSTLE" bold -->
  <!-- Using system sans-serif as fallback; Space Grotesk via CSS/web font -->
  <text x="118" y="95" font-family="'Space Grotesk', 'Inter', 'Helvetica Neue', sans-serif" font-size="42" fill="#1B4965">
    <tspan font-weight="400">my</tspan><tspan font-weight="700">HUSTLE</tspan>
  </text>
</svg>
